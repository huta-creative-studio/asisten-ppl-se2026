# Nginx configuration for optimal performance

# Gzip compression
gzip on;
gzip_vary on;
gzip_min_length 1000;
gzip_comp_level 6;
gzip_types 
    text/plain 
    text/css 
    text/xml 
    text/javascript 
    application/javascript 
    application/x-javascript 
    application/json
    font/opentype 
    font/truetype
    image/svg+xml;

# Brotli compression (if available)
# brotli on;
# brotli_comp_level 6;
# brotli_types text/plain text/css text/xml text/javascript application/javascript application/x-javascript application/json;

# Cache control for static assets
location ~* \.(js|css)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    access_log off;
}

# Cache control for images and fonts
location ~* \.(png|jpg|jpeg|gif|svg|webp|ico|woff|woff2)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    access_log off;
}

# No cache for HTML and service worker
location ~* \.(html|sw\.js)$ {
    expires -1;
    add_header Cache-Control "no-cache, no-store, must-revalidate, public, max-age=0";
    add_header Pragma "no-cache";
}

# Service worker should be served with correct MIME type
location ~* \.js$ {
    add_header Content-Type "application/javascript; charset=utf-8";
}

# Enable CORS for fonts
location ~* \.(woff|woff2)$ {
    add_header Access-Control-Allow-Origin "*";
}
