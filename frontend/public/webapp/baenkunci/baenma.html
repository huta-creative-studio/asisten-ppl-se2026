<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Admin - Generate Kode Aktivasi Asisten PPL SE2026</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  * { box-sizing: border-box; }
  body {
    background: #1a0a0a;
    color: #fff;
    font-family: 'Segoe UI', sans-serif;
    margin: 0;
    padding: 20px;
    display: flex;
    justify-content: center;
  }
  .wrap { max-width: 480px; width: 100%; }
  .card {
    background: #2a1414;
    border: 1px solid #5c1a1a;
    border-radius: 16px;
    padding: 28px;
    margin-bottom: 20px;
  }
  h1 { font-size: 20px; color: #ffb199; margin: 0 0 4px; }
  h2 { font-size: 15px; color: #ffb199; margin: 0 0 12px; }
  p.desc { color: #999; font-size: 13px; margin-bottom: 20px; }
  label { font-size: 13px; color: #ccc; display: block; margin-bottom: 6px; }
  input, select {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: 1px solid #5c1a1a;
    background: #1a0a0a;
    color: #fff;
    font-size: 14px;
    margin-bottom: 14px;
  }
  button {
    width: 100%;
    padding: 14px;
    border-radius: 10px;
    border: none;
    background: #8b1a1a;
    color: #fff;
    font-weight: bold;
    font-size: 15px;
    cursor: pointer;
  }
  button:disabled { opacity: 0.6; cursor: not-allowed; }
  button.secondary { background: #444; margin-top: 4px; }

  #hasilBox {
    margin-top: 16px;
    padding: 16px;
    border-radius: 10px;
    background: #1a3a1a;
    border: 1px solid #2a5a2a;
    display: none;
  }
  .kode-box {
    font-size: 20px;
    font-weight: bold;
    color: #ffd166;
    letter-spacing: 1px;
    margin: 8px 0;
    user-select: all;
    word-break: break-all;
  }
  .btn-copy {
    background: #2a5a2a;
    padding: 8px 14px;
    font-size: 13px;
    width: auto;
    display: inline-block;
    margin-right: 6px;
  }
  .pesan-wa {
    background: #1a1a2a;
    border: 1px solid #2a2a5a;
    padding: 12px;
    border-radius: 8px;
    font-size: 13px;
    color: #ccc;
    white-space: pre-wrap;
    margin-top: 10px;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
  }
  th, td {
    text-align: left;
    padding: 6px 4px;
    border-bottom: 1px solid #3a1a1a;
    color: #ccc;
  }
  th { color: #ffb199; }
  .badge {
    padding: 2px 8px;
    border-radius: 20px;
    font-size: 11px;
  }
  .badge.belum { background: #4a3a1a; color: #ffd166; }
  .badge.aktif { background: #1a3a1a; color: #7fff7f; }
  #errorMsg { color: #ff8080; font-size: 13px; margin-top: 8px; }
</style>
</head>
<body>
<div class="wrap">

  <div class="card">
    <h1>🔐 Admin - Generate Kode Aktivasi</h1>
    <p class="desc">Gunakan setelah pembayaran dikonfirmasi valid via WhatsApp. Kode dibuat dengan status "belum" — akan otomatis jadi "aktif" saat pembeli login pertama kali di aplikasi.</p>

    <label>Passcode Admin</label>
    <input type="password" id="passcode" placeholder="Masukkan passcode admin">

    <label>Catatan (Nama & No. WhatsApp Pembeli)</label>
    <input type="text" id="catatan" placeholder="Contoh: Budi Santoso - 62812xxxxxxx">

    <label>Masa Berlaku Kode</label>
    <select id="expiresDays">
      <option value="0">Tanpa batas waktu</option>
      <option value="1">Demo - 1 hari</option>
      <option value="30">30 hari</option>
      <option value="60">60 hari</option>
      <option value="90">90 hari</option>
    </select>

    <button id="btnGenerate" onclick="generateKode()">Generate Kode Aktivasi</button>

    <div id="hasilBox">
      <p>Kode berhasil dibuat:</p>
      <div class="kode-box" id="kodeHasil"></div>
      <button class="btn-copy" onclick="salinKode()">📋 Salin Kode</button>
      <button class="btn-copy" onclick="salinPesanWA()">📋 Salin Pesan WA</button>
      <div class="pesan-wa" id="pesanWA"></div>
    </div>
    <div id="errorMsg"></div>
  </div>

  <div class="card">
    <h2>📋 20 Kode Terakhir Dibuat</h2>
    <button class="secondary" onclick="muatDaftar()">Muat Ulang Daftar</button>
    <div style="overflow-x:auto; margin-top:12px;">
      <table id="tabelKode">
        <thead>
          <tr><th>Kode</th><th>Status</th><th>Catatan</th><th>Nama Login</th></tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

</div>

<script>
  // GANTI dengan URL Web App Apps Script Anda (yang sama dengan endpoint aktivasi/cek/logout)
  const API_URL = "https://script.google.com/macros/s/AKfycbzUMVTcWHvlpRiWK7runS6kg0tZrdmEzLJvKjCgenKGm3pZkc4hbfaASmP-bd5tb3j6sw/exec";
  const LINK_APLIKASI = "https://www.asistenppl-se2026.my.id/";

  let kodeTerakhir = "";
  let pesanWATerakhir = "";

  async function generateKode() {
    const passcode = document.getElementById('passcode').value.trim();
    const catatan = document.getElementById('catatan').value.trim();
    const expiresDays = document.getElementById('expiresDays').value;
    const btn = document.getElementById('btnGenerate');
    const errorMsg = document.getElementById('errorMsg');
    const hasilBox = document.getElementById('hasilBox');

    errorMsg.innerText = "";
    hasilBox.style.display = "none";

    if (!passcode) {
      errorMsg.innerText = "Masukkan passcode admin.";
      return;
    }

    btn.disabled = true;
    btn.innerText = "Memproses...";

    try {
      const isDemo = expiresDays === "1";
      const catatanKirim = isDemo ? `[DEMO] ${catatan}` : catatan;

      const response = await fetch(API_URL, {
        method: "POST",
        body: JSON.stringify({
          action: "generate",
          passcode: passcode,
          catatan: catatanKirim,
          expiresDays: expiresDays,
          isDemo: isDemo
        })
      });
      const data = await response.json();

      if (data.success) {
        kodeTerakhir = data.kode;
        document.getElementById('kodeHasil').innerText = data.kode;

        const namaSaja = catatan.split(" - ")[0] || "";

        if (isDemo) {
          pesanWATerakhir =
`Halo ${namaSaja},

Berikut kode DEMO untuk mencoba Asisten Petugas Pencacah Lapangan SE2026, berlaku 1 hari sejak diaktivasi.

Link Aplikasi:
${LINK_APLIKASI}

Kode Demo (berlaku 1 hari):
${data.kode}

Cara aktivasi:
1. Buka link di atas
2. Masukkan kode di atas & nama Anda pada halaman login
3. Kode ini otomatis kadaluarsa 1 hari setelah pertama kali dipakai

Kalau cocok dan ingin lanjut pakai penuh, hubungi kami lagi untuk dapatkan kode aktif tanpa batas waktu demo ya!`;
        } else {
          pesanWATerakhir =
`Halo ${namaSaja},

Terima kasih sudah melakukan pembayaran untuk kode akses - Asisten Petugas Pencacah Lapangan SE2026.

Berikut akses Anda:

Link Aplikasi:
${LINK_APLIKASI}

Kode Aktivasi:
${data.kode}

Cara aktivasi:
1. Buka link di atas
2. Masukkan kode aktivasi & nama Anda pada halaman login
3. Kode hanya berlaku untuk 1 perangkat dalam satu waktu. Kalau ingin pindah perangkat, logout dulu dari perangkat lama di menu aplikasi

Jika ada kendala, silakan hubungi kami kembali.

Terima kasih!`;
        }

        document.getElementById('pesanWA').innerText = pesanWATerakhir;
        hasilBox.style.display = "block";
        muatDaftar();
      } else {
        errorMsg.innerText = data.message;
      }
    } catch (err) {
      errorMsg.innerText = "Gagal terhubung ke server. Coba lagi.";
    }

    btn.disabled = false;
    btn.innerText = "Generate Kode Aktivasi";
  }

  function salinKode() {
    navigator.clipboard.writeText(kodeTerakhir);
    alert("Kode disalin: " + kodeTerakhir);
  }

  function salinPesanWA() {
    navigator.clipboard.writeText(pesanWATerakhir);
    alert("Pesan WA disalin, siap paste ke chat pembeli.");
  }

  async function muatDaftar() {
    const passcode = document.getElementById('passcode').value.trim();
    if (!passcode) return;

    try {
      const response = await fetch(API_URL, {
        method: "POST",
        body: JSON.stringify({ action: "listgenerate", passcode: passcode })
      });
      const data = await response.json();
      if (data.success) {
        const tbody = document.querySelector('#tabelKode tbody');
        tbody.innerHTML = "";
        data.daftar.forEach(item => {
          const statusClass = (item.status || '').toLowerCase() === 'aktif' ? 'aktif' : 'belum';
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td>${item.kode}</td>
            <td><span class="badge ${statusClass}">${item.status || '-'}</span></td>
            <td>${item.catatan || '-'}</td>
            <td>${item.nama || '-'}</td>
          `;
          tbody.appendChild(tr);
        });
      } else {
        alert(data.message);
      }
    } catch (err) {
      console.error(err);
    }
  }
</script>
</body>
</html>
